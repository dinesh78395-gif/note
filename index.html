<!DOCTYPE html>
<html>
<head>
<title>Serious Sticky</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #ececec;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive;
}

.sticky {
    width: 340px;
    padding: 20px;
    position: absolute;
    top: 120px;
    left: 120px;
    border-radius: 6px;
    background-color: #fff8c6;

    box-shadow:
        10px 10px 25px rgba(0,0,0,0.3),
        inset 0 0 30px rgba(0,0,0,0.05);

    transform: rotate(-1deg);
    cursor: grab;
    user-select: none;
}

h2 {
    text-align: center;
    margin-top: 0;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    margin: 12px 0;
    display: flex;
    align-items: center;
    position: relative;
}

.taskInput {
    flex: 1;
    border: none;
    background: transparent;
    border-bottom: 1px dashed rgba(0,0,0,0.4);
    font-size: 16px;
    outline: none;
}

.tick {
    margin-right: 8px;
    cursor: pointer;
    transform: scale(1.2);
}

li.completed::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.85);
    transform: rotate(-2deg);
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 8px;
    border: none;
    background: #222;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="sticky" id="stickyNote">
    <h2>Today's Mission</h2>
    <ul id="taskList"></ul>
    <button id="lockBtn">Let's Do It</button>
</div>

<script>
const sticky = document.getElementById("stickyNote");
const taskList = document.getElementById("taskList");
const lockBtn = document.getElementById("lockBtn");

let locked = false;

/* Random pastel */
function randomPastel() {
    const hue = Math.floor(Math.random() * 360);
    return `hsl(${hue}, 80%, 85%)`;
}

/* Create tasks safely */
function createTasks() {
    taskList.innerHTML = "";

    for (let i = 1; i <= 6; i++) {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "tick";

        const input = document.createElement("input");
        input.type = "text";
        input.className = "taskInput";
        input.placeholder = "Task " + i;

        li.appendChild(checkbox);
        li.appendChild(input);
        taskList.appendChild(li);

        checkbox.addEventListener("change", () => {
            if (!locked) return;

            li.classList.add("completed");

            setTimeout(() => {
                input.value = "";
                checkbox.checked = false;
                li.classList.remove("completed");
            }, 400);
        });
    }
}

/* Lock */
lockBtn.addEventListener("click", () => {
    locked = true;
    document.querySelectorAll(".taskInput").forEach(input => {
        input.setAttribute("readonly", true);
    });
    lockBtn.style.display = "none";
});

/* Drag */
let isDragging = false;
let offsetX = 0, offsetY = 0;

sticky.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - sticky.offsetLeft;
    offsetY = e.clientY - sticky.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    sticky.style.left = (e.clientX - offsetX) + "px";
    sticky.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

/* Run after DOM loads */
document.addEventListener("DOMContentLoaded", () => {
    sticky.style.backgroundColor = randomPastel();
    createTasks();
});
</script>

</body>
</html>
